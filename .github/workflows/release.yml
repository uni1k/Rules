name: Auto Generate Rules

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: '0 10 */3 * *'

permissions:
  contents: write

concurrency:
  group: generated-rules-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Check and Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.lock

      - name: Test Generator
        run: python -m unittest discover -s tests -v

      - name: Generate Apple Rule
        run: |
          python ruleset.py \
            --source https://raw.githubusercontent.com/dler-io/Rules/master/Surge/Surge%203/Provider/Apple.list        \
            --source https://ruleset.skk.moe/List/non_ip/apple_services.conf \
            --source https://ruleset.skk.moe/List/ip/apple_services.conf \
            > Apple.list

      - name: Generate Apple China Rule
        run: |
          python ruleset.py \
            --source https://ruleset.skk.moe/List/non_ip/apple_cn.conf \
            > AppleCN.list

      - name: Generate Apple CDN Rule
        run: |
          python ruleset.py \
            --source https://ruleset.skk.moe/List/domainset/apple_cdn.conf \
            > AppleCDN.list

      - name: Generate China Rule
        run: |
          # --source https://www.naiixi.com/Extra_CN.list
          # --source https://www.naiixi.com/Extra_CN_2.list
          python ruleset.py \
            --source https://raw.githubusercontent.com/Coldvvater/Mononoke/refs/heads/master/Surge/Rules/ChinaDomain.list \
            --source https://raw.githubusercontent.com/nexitallyy/ProxyRules/main/Extra_CN_3.list \
            --source https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ChinaCompanyIp.list \
            --source https://ruleset.skk.moe/List/non_ip/domestic.conf \
            --source https://ruleset.skk.moe/List/ip/domestic.conf \
            --source https://ruleset.skk.moe/List/ip/china_ip.conf \
            --source https://ruleset.skk.moe/List/ip/china_ip_ipv6.conf \
            --exclude DOMAIN-SUFFIX,cn \
            --exclude DOMAIN-SUFFIX,ip.sb \
            > China.list

      - name: Generate Global Rule
        run: |
          python ruleset.py \
            --source https://raw.githubusercontent.com/Coldvvater/Mononoke/refs/heads/master/Surge/Rules/Proxy.list \
            --source https://raw.githubusercontent.com/Coldvvater/Mononoke/refs/heads/master/Surge/Rules/ProxyGFW.list \
            --source https://ruleset.skk.moe/List/non_ip/global.conf \
            --source DOMAIN-SUFFIX,cathaypacific.com \
            --source DOMAIN-SUFFIX,asiamiles.com \
            > Global.list

      - name: Generate Media Rule
        run: |
          python ruleset.py \
            --source https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/Netflix/Netflix.list                   \
            --source https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/Disney/Disney.list                     \
            --source https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/TikTok/TikTok.list                     \
            --source https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/AmazonPrimeVideo/AmazonPrimeVideo.list \
            --source https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/YouTube/YouTube.list                   \
            --source https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/YouTubeMusic/YouTubeMusic.list         \
            --source https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/HBO/HBO.list                           \
            --source https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/Hulu/Hulu.list                         \
            --source https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/Twitch/Twitch.list                     \
            --source https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/Spotify/Spotify.list                   \
            --source https://ruleset.skk.moe/List/non_ip/stream.conf \
            --source https://ruleset.skk.moe/List/ip/stream.conf \
            > Media.list

      - name: Generate Regional Media Rules
        run: |
          for region in eu hk jp kr tw us
          do
            python ruleset.py \
              --source "https://ruleset.skk.moe/List/non_ip/stream_${region}.conf" \
              --source "https://ruleset.skk.moe/List/ip/stream_${region}.conf" \
              > "Media${region^^}.list"
          done

      - name: Generate MediaCN Rule
        run: |
          python ruleset.py \
            --source https://raw.githubusercontent.com/dler-io/Rules/main/Surge/Surge%203/Provider/Media/Bilibili.list               \
            --source https://raw.githubusercontent.com/dler-io/Rules/main/Surge/Surge%203/Provider/Media/IQIYI.list                  \
            --source https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/NetEaseMusic/NetEaseMusic.list \
            --source https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/TencentVideo/TencentVideo.list \
            --source https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/Youku/Youku.list               \
            --source https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/Sohu/Sohu.list                 \
            --source https://ruleset.skk.moe/List/non_ip/neteasemusic.conf \
            > MediaCN.list

      - name: Generate AI Rule
        run: |
          python ruleset.py \
            --source https://raw.githubusercontent.com/Coldvvater/Mononoke/refs/heads/master/Surge/Rules/AI.list \
            --source https://ruleset.skk.moe/List/non_ip/ai.conf \
            > AI.list

      - name: Generate Microsoft Rule
        run: |
          python ruleset.py \
            --source https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/Microsoft/Microsoft.list  \
            --source https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/Teams/Teams.list          \
            --source https://ruleset.skk.moe/List/non_ip/microsoft.conf \
            > Microsoft.list

      - name: Generate Microsoft CDN Rule
        run: |
          python ruleset.py \
            --source https://ruleset.skk.moe/List/non_ip/microsoft_cdn.conf \
            > MicrosoftCDN.list

      - name: Generate Reject Rule
        run: |
          python ruleset.py --force-no-resolve \
            --source https://raw.githubusercontent.com/dler-io/Rules/refs/heads/main/Surge/Surge%203/Provider/AdBlock.list \
            --source https://ruleset.skk.moe/List/domainset/reject.conf \
            --source https://ruleset.skk.moe/List/non_ip/reject.conf \
            --source https://ruleset.skk.moe/List/ip/reject.conf \
            > Reject.list

      - name: Generate Supplemental Reject Rules
        run: |
          python ruleset.py \
            --source https://ruleset.skk.moe/List/non_ip/reject-drop.conf \
            > RejectDrop.list
          python ruleset.py \
            --source https://ruleset.skk.moe/List/non_ip/reject-no-drop.conf \
            > RejectNoDrop.list

      - name: Generate CDN Rule
        run: |
          python ruleset.py \
            --source https://ruleset.skk.moe/List/domainset/cdn.conf \
            --source https://ruleset.skk.moe/List/non_ip/cdn.conf \
            > CDN.list

      - name: Generate Download Rule
        run: |
          python ruleset.py \
            --source https://ruleset.skk.moe/List/domainset/download.conf \
            --source https://ruleset.skk.moe/List/non_ip/download.conf \
            > Download.list

      - name: Generate Speedtest Rule
        run: |
          python ruleset.py \
            --source https://ruleset.skk.moe/List/domainset/speedtest.conf \
            > Speedtest.list

      - name: Generate iCloud Private Relay Rule
        run: |
          python ruleset.py \
            --source https://ruleset.skk.moe/List/domainset/icloud_private_relay.conf \
            > iCloudPrivateRelay.list

      - name: Generate Direct and LAN Rules
        run: |
          python ruleset.py \
            --source https://ruleset.skk.moe/List/non_ip/direct.conf \
            > Direct.list
          python ruleset.py \
            --source https://ruleset.skk.moe/List/non_ip/lan.conf \
            --source https://ruleset.skk.moe/List/ip/lan.conf \
            > LAN.list

      - name: Generate Steam Rule
        run: |
          python ruleset.py \
            --source https://raw.githubusercontent.com/dler-io/Rules/master/Surge/Surge%203/Provider/Steam.list \
            > Steam.list

      - name: Generate Telegram Rule
        run: |
          python ruleset.py \
            --source https://raw.githubusercontent.com/dler-io/Rules/master/Surge/Surge%203/Provider/Telegram.list           \
            --source https://ruleset.skk.moe/List/non_ip/telegram.conf \
            --source https://ruleset.skk.moe/List/ip/telegram.conf \
            > Telegram.list

      - name: Convert Clash Rules
        run: |
          python split_providers.py --directory .
          for rule in *.list
          do
            python ruleset.py -c -s "file://$PWD/$rule" > "${rule%.*}.yaml"
          done

      - name: Verify Generated Providers
        run: python verify_release.py --directory . --manifest manifest.json --workflow .github/workflows/release.yml

      - name: Push to Branch
        run: |
          git config --global user.name  'xjasonlyu'
          git config --global user.email 'xjasonlyu@users.noreply.github.com'
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${GITHUB_REPOSITORY}

          git checkout release

          rm -rf Clash Surge
          mkdir -p Clash Surge
          cp -f *.yaml Clash/
          cp -f *.list Surge/
          cp manifest.json Surge/manifest.json

          git add -A Clash Surge

          git commit -m "Update $(date -u +%Y%m%d%H%M%S)" && git push origin release || echo "nothing to commit"
