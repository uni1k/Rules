name: Auto Generate Rules

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: '0 10 */3 * *'

permissions:
  contents: write

concurrency:
  group: generated-rules-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Check and Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.lock

      - name: Test Generator
        run: python -m unittest discover -s tests -v

      # ---- Phase 1: generate exclusion sources first ----

      - name: Generate MainlandMedia Rule
        run: |
          python ruleset.py \
            --source https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/ChinaMedia/ChinaMedia.list \
            > MainlandMedia.list

      - name: Generate GlobalMedia Rule
        run: |
          python ruleset.py \
            --source https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/GlobalMedia/GlobalMedia_All.list \
            > GlobalMedia.list

      - name: Generate Google Rule
        run: |
          python ruleset.py \
            --source https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/Google/Google.list \
            > Google.list

      # ---- Phase 2: generate final providers ----

      - name: Generate LAN Rule
        run: |
          python ruleset.py \
            --source https://ruleset.skk.moe/List/non_ip/direct.conf \
            --source https://ruleset.skk.moe/List/non_ip/lan.conf \
            --source https://ruleset.skk.moe/List/ip/lan.conf \
            > LAN.list

      - name: Generate AI Rule
        run: |
          python ruleset.py \
            --source https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/OpenAI/OpenAI.list \
            --source https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/Claude/Claude.list \
            --source https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/Gemini/Gemini.list \
            --source https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/Copilot/Copilot.list \
            --source https://ruleset.skk.moe/List/non_ip/ai.conf \
            --source https://raw.githubusercontent.com/xjasonlyu/Rules/release/Surge/AI.list \
            > AI.list


      - name: Generate Telegram Rule
        run: |
          python ruleset.py \
            --source https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/Telegram/Telegram.list \
            > Telegram.list

      - name: Generate Apple Rule
        run: |
          python ruleset.py \
            --source https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/Apple/Apple.list \
            > Apple.list

      - name: Generate Microsoft Rule
        run: |
          python ruleset.py \
            --source https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/Microsoft/Microsoft.list \
            > Microsoft.list

      - name: Generate Mainland Rule
        run: |
          python ruleset.py \
            --source https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/ChinaMaxNoMedia/ChinaMaxNoMedia_All.list \
            > Mainland.list

      - name: Generate Global Rule
        run: |
          python ruleset.py \
            --source https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/Global/Global_All.list \
            > Global.list

      - name: Generate Game Rule
        run: |
          python ruleset.py \
            --source https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/Game/Game.list \
            > Game.list

      - name: Generate Reject Rule
        run: |
          python ruleset.py --force-no-resolve \
            --source https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/AdvertisingLite/AdvertisingLite_All.list \
            --source https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/Hijacking/Hijacking.list \
            --source https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/Privacy/Privacy_All.list \
            --source https://ruleset.skk.moe/List/non_ip/reject.conf \
            --source https://ruleset.skk.moe/List/ip/reject.conf \
            --source https://ruleset.skk.moe/List/domainset/reject.conf \
            > Reject.list

      - name: Convert Clash Rules
        run: |
          for rule in *.list
          do
            python ruleset.py -c -s "file://$PWD/$rule" > "${rule%.*}.yaml"
          done

      - name: Verify Generated Providers
        run: python verify_release.py --directory . --manifest manifest.json --workflow .github/workflows/release.yml

      - name: Push to Branch
        run: |
          git config --global user.name  'uni1k'
          git config --global user.email 'uni1k@users.noreply.github.com'
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${GITHUB_REPOSITORY}

          git checkout release

          rm -rf Clash Surge
          mkdir -p Clash Surge
          cp -f *.yaml Clash/
          cp -f *.list Surge/
          cp manifest.json Surge/manifest.json

          git add -A Clash Surge

          git commit -m "Update $(date -u +%Y%m%d%H%M%S)" && git push origin release || echo "nothing to commit"
